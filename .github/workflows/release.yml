name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF -replace 'refs/tags/','' } else { '${{ github.event.inputs.version }}' }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Publish (win-x64, self-contained)
        run: >
          dotnet publish src/TeamsCustomMuteWeb/TeamsCustomMuteWeb.csproj
          -c Release -r win-x64 --self-contained
          -p:DebugType=none
          -o publish/win-x64

      - name: Package (win-x64)
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $zip = "TeamsCustomMute-$tag-win-x64.zip"
          Compress-Archive -Path publish/win-x64/* -DestinationPath $zip -Force
          "zip=$zip" >> $env:GITHUB_ENV

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            ${{ env.zip }}
